name: Build Python (AOSP + Termux Hybrid)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      cross_target:
        description: 'CROSS_TARGET (e.g. aarch64-linux-android34)'
        required: false
        default: 'aarch64-linux-android34'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NDK_VERSION: r27c
  ANDROID_API: 34

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    permissions:
      contents: write   # required only for release upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"
          log-accepted-android-sdk-licenses: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      - name: Build (build.sh)
        run: |
          chmod +x ./build.sh
          export API_LEVEL=${{ env.ANDROID_API }}
          export CROSS_TARGET=${{ github.event.inputs.cross_target }}
          ./build.sh

      - name: List artifacts
        run: |
          ls -lah

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            *.deb
            build/*.deb
            **/*.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.deb" -exec cp {} release/ \;

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
