name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

# ✅ Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  API_LEVEL: 34
  NDK_VERSION: 27.2.12479018
  BUILD_ROOT: ${{ github.workspace }}/.build
  TERMUX_PREFIX: ${{ github.workspace }}/install

jobs:

# ─────────────────────────────────────────────
# 🍏 macOS (aarch64)
# ─────────────────────────────────────────────
  macos-aarch64:
    name: macOS aarch64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      # ☕ Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 📱 Android SDK + NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"
          log-accepted-android-sdk-licenses: false

      - name: Install deps
        run: |
          brew update
          brew install autoconf automake libtool pkg-config ccache

      - name: Enable ccache
        run: |
          echo "CC=ccache clang" >> $GITHUB_ENV
          echo "CXX=ccache clang++" >> $GITHUB_ENV

      - name: Build
        env:
          TERMUX_ARCH: aarch64
          TERMUX_PKG_API_LEVEL: ${{ env.API_LEVEL }}
          TERMUX_STANDALONE_TOOLCHAIN: $ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/darwin-x86_64
          GITHUB_ACTIONS: "true"
          CFLAGS: "-O3 -flto -fvisibility=hidden"
          LDFLAGS: "-flto -Wl,-z,relro,-z,now"
        run: bash cpython/bee/build.sh

      - name: Test
        run: ./install/bin/python3 -c "import ssl, sqlite3, bz2, lzma, curses"

      - name: Upload install
        uses: actions/upload-artifact@v4
        with:
          name: python-aarch64-macos
          path: install/

# ─────────────────────────────────────────────
# 🐧 Linux builds (.deb)
# ─────────────────────────────────────────────
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, arm, i686, x86_64]

    steps:
      - uses: actions/checkout@v4

      # ☕ Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 📱 Android SDK + NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"
          log-accepted-android-sdk-licenses: false

      # ⚡ Cache
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.ccache
          key: build-${{ matrix.arch }}-api34-${{ hashFiles('cpython/bee/build.sh') }}
          restore-keys: |
            build-${{ matrix.arch }}-api34-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential curl xz-utils \
            autoconf automake libtool pkg-config \
            python3 python3-dev fakeroot dpkg ccache

      - name: Enable ccache
        run: |
          echo "CC=ccache clang" >> $GITHUB_ENV
          echo "CXX=ccache clang++" >> $GITHUB_ENV

      - name: Build
        env:
          TERMUX_ARCH: ${{ matrix.arch }}
          TERMUX_PKG_API_LEVEL: ${{ env.API_LEVEL }}
          TERMUX_STANDALONE_TOOLCHAIN: $ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64
          GITHUB_ACTIONS: "true"
          CFLAGS: "-O3 -flto -fvisibility=hidden"
          LDFLAGS: "-flto -Wl,-z,relro,-z,now"
        run: bash cpython/bee/build.sh

      - name: Test
        run: ./install/bin/python3 -c "import ssl, sqlite3, bz2, lzma, curses"

      - name: Verify .deb
        run: |
          deb=$(ls .build/python_*.deb | head -1)
          dpkg-deb --info "$deb"
          dpkg-deb --contents "$deb" | grep python3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: .build/python_*.deb

# ─────────────────────────────────────────────
# 🚀 Release Upload
# ─────────────────────────────────────────────
  release:
    name: Upload to GitHub Release
    needs: linux
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: debs/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
