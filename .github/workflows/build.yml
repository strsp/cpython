name: Android Python Build (AArch64)

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # 🔒 minimal by default

env:
  NDK_VERSION: 26.1.10909125
  API_LEVEL: 34
  TARGET: aarch64-linux-android

jobs:
  build:
    runs-on: macos-14

    permissions:
      contents: write  # ✅ only where needed (release)

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 🔒 fix zizmor warning

      # ☕ Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 📱 Android SDK + NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"
          log-accepted-android-sdk-licenses: false

      # ⚙️ Setup toolchain
      - name: Setup toolchain
        run: |
          export TOOLCHAIN=$ANDROID_HOME/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/darwin-x86_64
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/${TARGET}${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${TARGET}${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      # 🧠 Build Python
      - name: Build Python
        run: |
          chmod +x bee/regen.sh
          ./bee/regen.sh all

          mkdir build && cd build

          ../configure \
            --host=${TARGET} \
            --build=$(uname -m)-apple-darwin \
            --enable-optimizations \
            --with-lto \
            ac_cv_file__dev_ptmx=yes \
            ac_cv_file__dev_ptc=no

          make -j$(sysctl -n hw.ncpu)

      # 📦 Create .deb
      - name: Package .deb
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/local

          make DESTDIR=$(pwd)/pkg install

          cat > pkg/DEBIAN/control <<EOF
          Package: python-android
          Version: 3.13.0
          Architecture: arm64
          Maintainer: zrsx
          Description: Optimized Python for Android (API 34)
          EOF

          dpkg-deb --build pkg python-android.deb

      # 🔍 Fix SC2012 (NO ls)
      - name: Locate artifact safely
        run: |
          find . -type f -name "*.deb" -print

      # 🚀 Upload Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: |
            python-android.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
